---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  values:
    crds:
      enabled: false
    defaultRules:
      create: true
      disabled:
        kubeControllerManager: true
        kubeScheduler: true
        kubeProxy: true
        etcd: true
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
    kubeEtcd:
      enabled: false
    prometheus:
      prometheusSpec:
        initContainers:
          - name: init-chown-data
            image: busybox:latest
            imagePullPolicy: IfNotPresent
            command: ["sh", "-c", "chown -R 65534:65534 /prometheus"]
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
              privileged: true
            volumeMounts:
              - name: prometheus-kube-prometheus-stack-prometheus-db
                mountPath: /prometheus
                subPath: prometheus-db
        securityContext:
          fsGroup: 65534
          runAsGroup: 65534
          runAsNonRoot: true
          runAsUser: 65534
        retention: 30d
        retentionSize: 25GiB
        serviceMonitorSelector: {}
        podMonitorSelector: {}
        probeSelector: {}
        serviceMonitorNamespaceSelector: {}
        podMonitorNamespaceSelector: {}
        probeNamespaceSelector: {}
        ruleSelector:
          matchLabels:
            release: kube-prometheus-stack
        ruleNamespaceSelector: {}
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path-retain
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 30Gi
    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi
        alertmanagerConfigSelector: {}
        alertmanagerConfigNamespaceSelector: {}
        alertmanagerConfigMatcherStrategy:
          type: None
      config:
        route:
          group_by: [alertname, severity]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: "null"
        inhibit_rules:
          - source_matchers: [severity = critical]
            target_matchers: [severity = warning]
            equal: [alertname, namespace]
          - source_matchers: [alertname = InfoInhibitor]
            target_matchers: [severity = info]
            equal: [namespace]
        receivers:
          - name: "null"
    grafana:
      enabled: true
      initChownData:
        enabled: false
      persistence:
        enabled: true
        storageClassName: local-path
        size: 2Gi
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
          label: grafana_dashboard
          labelValue: "1"
        datasources:
          enabled: true
          searchNamespace: ALL
